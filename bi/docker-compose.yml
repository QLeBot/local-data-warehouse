# Metabase with DuckDB driver, with warehouse mounted for local.duckdb.
# From repo root: docker compose -f bi/docker-compose.yml up
# Then add database in Metabase: DuckDB, JDBC URL: jdbc:duckdb:/warehouse/local.duckdb
services:
  metabase:
    build:
      context: .
      dockerfile: Dockerfile.metabase
    ports:
      - "3000:3000"
    volumes:
      - metabase-data:/metabase-data
      - ../warehouse:/warehouse:ro
    environment:
      MB_DB_FILE: /metabase-data/metabase.db

volumes:
  metabase-data: {}
